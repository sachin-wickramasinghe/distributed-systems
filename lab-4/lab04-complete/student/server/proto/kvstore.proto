syntax = "proto3";

package kvstore;
option go_package = "lab04server/proto";

// KeyValueStore defines the gRPC service interface.
// This file is the single source of truth for the API contract.
// protoc uses this file to generate Go code automatically.
service KeyValueStore {
  rpc Put(PutRequest)       returns (PutResponse);
  rpc Get(GetRequest)       returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest)     returns (ListResponse);
}

message PutRequest    { string key = 1; string value = 2; }
message PutResponse   { bool success = 1; }
message GetRequest    { string key = 1; }
message GetResponse   { string value = 1; bool found = 2; }
message DeleteRequest { string key = 1; }
message DeleteResponse{ bool deleted = 1; }
message ListRequest   {}
message ListResponse  { repeated string keys = 1; }
